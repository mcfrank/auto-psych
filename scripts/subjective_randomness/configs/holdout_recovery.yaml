# Holdout recovery: hold each seed model out as the ground truth, run the full
# agentic outer+inner loop seeded with the remaining models, and track the
# correlation between the loop's best model and the ground truth on a large
# held-out stimulus set at every inner-loop scoring step.
project_id: subjective_randomness
# The GT/baseline registry: the original validated model set (with pure-Python
# family twins for data generation). Deliberately NOT the live project
# seed_models dir — since the hero-run promotion that manifest holds the
# replicate winners, which have no family twins.
seed_models_dir: src/subjective_randomness/pymc_model_families

# null | [names] | {name: params|null} — the same shapes as model_recovery's
# generating_models (null/missing params -> the family's DEFAULT_PARAMS).
gt_models:
  bayesian_diagnosticity:
  encoding_compressibility:
  prototype_similarity:
  window_typicality:

n_experiments: 3
n_participants: 40  # match the live human experiment (full_run.yaml: 40/experiment)
seed: 7

inner_loop:
  max_iterations: 2
  candidate_count: 3

agent:
  timeout_sec: 900
  backend: opencode # null -> CODING_AGENT env var, then "claude"
  model: google/gemini-3.1-pro-preview

# Held-out evaluation stimuli. Pairs the design agents happened to use for
# training are excluded after the run; fail loudly if fewer than min_remaining
# survive.
# Exhaustive: evaluate on every distinct same-length pair for the lengths, so
# seed-holdout results are directly comparable to the impossible-holdout runs
# (which have always used the exhaustive pool). predict_max_draws thins the
# posterior so the (draws x n_stim) prediction array stays bounded.
eval_pool:
  exhaustive: true
  lengths: [1, 2, 3, 4, 5, 6, 7, 8]
  predict_max_draws: 500
  min_remaining: 100

fit:
  draws: 2000
  tune: 1000
  chains: 4
