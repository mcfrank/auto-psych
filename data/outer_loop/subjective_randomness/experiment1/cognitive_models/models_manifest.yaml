models:
- name: bayesian_fair_coin
  rationale: 'Computes the log Bayes factor of the fair-coin hypothesis against a

    biased-coin alternative for each sequence, then picks the higher-LBF

    sequence via softmax. Operationalises Griffiths & Tenenbaum''s (2001)

    Bayesian account of representativeness: the sequence that most exceeds

    a biased alternative is judged more random.

    '
- name: alternation_bias
  rationale: 'Prefers whichever sequence has a higher alternation proportion

    (transitions / possible transitions). Captures the classic gambler''s

    fallacy: people expect fair coins to alternate more than they actually do

    and rate highly-alternating sequences as more random.

    '
- name: runs_penalty
  rationale: 'Prefers whichever sequence has a shorter maximum unbroken run. Long

    streaks (e.g., HHHHHH) feel deterministic, so their absence signals

    randomness. Complements alternation_bias by focusing on the worst-case

    run rather than the average alternation rate.

    '
- name: inner_loop_model
  rationale: Best PyMC model found by the inner model-improvement loop.
