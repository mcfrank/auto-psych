<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Randomness Judgment Experiment</title>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet">
  <style>
    .seq-display {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin: 30px 0;
    }
    .seq-box {
      text-align: center;
      padding: 20px 32px;
      background: #f5f5f5;
      border: 2px solid #ccc;
      border-radius: 10px;
      min-width: 160px;
    }
    .seq-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .seq-text {
      font-family: monospace;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 4px;
      color: #222;
    }
    .trial-prompt {
      font-size: 20px;
      text-align: center;
      margin-bottom: 10px;
      color: #333;
    }
    .jspsych-btn-auto {
      padding: 12px 36px;
      font-size: 17px;
      border-radius: 8px;
      border: 2px solid #4a90d9;
      cursor: pointer;
      background: white;
      color: #4a90d9;
      font-weight: 600;
      margin: 0 12px;
      transition: background 0.15s, color 0.15s;
    }
    .jspsych-btn-auto:hover {
      background: #4a90d9;
      color: white;
    }
  </style>
</head>
<body></body>
<script>
  const STIMULI = [
  {
    "sequence_a": "TTHT",
    "sequence_b": "THTH",
    "eig": 0.180861
  },
  {
    "sequence_a": "HHTH",
    "sequence_b": "HTHT",
    "eig": 0.180825
  },
  {
    "sequence_a": "THTHTH",
    "sequence_b": "TTHT",
    "eig": 0.180811
  },
  {
    "sequence_a": "HTHTHT",
    "sequence_b": "HTTHTTT",
    "eig": 0.143898
  },
  {
    "sequence_a": "HTHTHT",
    "sequence_b": "HTHHHHT",
    "eig": 0.142985
  },
  {
    "sequence_a": "TTHTTH",
    "sequence_b": "THTH",
    "eig": 0.139953
  },
  {
    "sequence_a": "HTTHTT",
    "sequence_b": "THTH",
    "eig": 0.139953
  },
  {
    "sequence_a": "THHTHTHT",
    "sequence_b": "TTTHT",
    "eig": 0.12955
  },
  {
    "sequence_a": "THTHT",
    "sequence_b": "TTTHTTHT",
    "eig": 0.127801
  },
  {
    "sequence_a": "HTHTHTH",
    "sequence_b": "TTTHTTTT",
    "eig": 0.126142
  },
  {
    "sequence_a": "HHTH",
    "sequence_b": "THTHTHHT",
    "eig": 0.125702
  },
  {
    "sequence_a": "HTHT",
    "sequence_b": "TTTH",
    "eig": 0.118449
  },
  {
    "sequence_a": "HTHT",
    "sequence_b": "TTTH",
    "eig": 0.118449
  },
  {
    "sequence_a": "HTHT",
    "sequence_b": "HTTHHHTH",
    "eig": 0.114746
  },
  {
    "sequence_a": "TTTT",
    "sequence_b": "HTHT",
    "eig": 0.113299
  },
  {
    "sequence_a": "HHHHT",
    "sequence_b": "HTHT",
    "eig": 0.111165
  },
  {
    "sequence_a": "HTHTHT",
    "sequence_b": "TTTT",
    "eig": 0.110485
  },
  {
    "sequence_a": "HTHHT",
    "sequence_b": "THTH",
    "eig": 0.10697
  },
  {
    "sequence_a": "HTHT",
    "sequence_b": "THTTH",
    "eig": 0.106346
  },
  {
    "sequence_a": "TTHTH",
    "sequence_b": "HTHT",
    "eig": 0.106346
  },
  {
    "sequence_a": "HTHT",
    "sequence_b": "HTTHT",
    "eig": 0.106346
  },
  {
    "sequence_a": "HTTTTH",
    "sequence_b": "THTH",
    "eig": 0.103463
  },
  {
    "sequence_a": "HHHHHHH",
    "sequence_b": "HTHT",
    "eig": 0.099643
  },
  {
    "sequence_a": "THHT",
    "sequence_b": "TTTT",
    "eig": 0.097659
  },
  {
    "sequence_a": "TTTHTHTT",
    "sequence_b": "HHTHTHT",
    "eig": 0.0943
  },
  {
    "sequence_a": "HTHTTHT",
    "sequence_b": "TTTHTTHT",
    "eig": 0.094137
  },
  {
    "sequence_a": "HTTHTHH",
    "sequence_b": "THTH",
    "eig": 0.090987
  },
  {
    "sequence_a": "TTTTH",
    "sequence_b": "TTTTHHH",
    "eig": 0.088891
  },
  {
    "sequence_a": "HHTHT",
    "sequence_b": "TTTTTTT",
    "eig": 0.087749
  },
  {
    "sequence_a": "TTHTTTT",
    "sequence_b": "HTHHTT",
    "eig": 0.085607
  },
  {
    "sequence_a": "TTTT",
    "sequence_b": "THHTHHT",
    "eig": 0.085289
  },
  {
    "sequence_a": "THHT",
    "sequence_b": "THTHTH",
    "eig": 0.085062
  }
];

  const jsPsych = initJsPsych({
    on_finish: function() {
      window.__experimentData = jsPsych.data.get().values();
      console.log('[auto-psych] experiment finished', window.__experimentData.length, 'trials');
    }
  });

  function makeStimDisplay(seq_a, seq_b) {
    return `
      <p class="trial-prompt">Which sequence looks <strong>more random</strong>?</p>
      <div class="seq-display">
        <div class="seq-box">
          <div class="seq-label">Sequence A</div>
          <div class="seq-text">${seq_a}</div>
        </div>
        <div class="seq-box">
          <div class="seq-label">Sequence B</div>
          <div class="seq-text">${seq_b}</div>
        </div>
      </div>
    `;
  }

  const trialVariables = STIMULI.map(s => ({
    sequence_a: s.sequence_a,
    sequence_b: s.sequence_b,
    stimulus_display: makeStimDisplay(s.sequence_a, s.sequence_b)
  }));

  function styledBtn(label) {
    return '<button class="jspsych-btn jspsych-btn-auto">' + label + '</button>';
  }

  const timeline = [];

  // Consent
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <h2>Research Study Consent</h2>
      <p style="max-width:560px; text-align:left; margin:auto;">
        You are invited to participate in a short study about how people perceive randomness.
        On each trial you will see two short sequences of coin flip outcomes (H = Heads, T = Tails)
        and choose which one looks more random to you. The study takes about 5 minutes.
        Your participation is voluntary and your responses are anonymous.
      </p>
      <br>
    `,
    choices: ['I agree — start the study'],
    button_html: styledBtn
  });

  // Instructions
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <h2>Instructions</h2>
      <p style="max-width:560px; text-align:left; margin:auto;">
        On each screen you will see two sequences of coin flip outcomes, labeled <strong>Sequence A</strong>
        and <strong>Sequence B</strong>. Each flip is shown as <strong>H</strong> (Heads) or <strong>T</strong> (Tails).
      </p>
      <p style="max-width:560px; text-align:left; margin:auto;">
        Your task is to choose which sequence looks <strong>more random</strong> to you.
        Click the button for the sequence that seems more like a genuine random coin flip.
        There are no right or wrong answers — we are interested in your intuitions.
      </p>
      <p style="max-width:560px; text-align:left; margin:auto;">
        There will be <strong>${trialVariables.length} trials</strong> in total. Please work at your own pace.
      </p>
      <br>
    `,
    choices: ['Begin'],
    button_html: styledBtn,
    post_trial_gap: 400
  });

  // Fixation cross
  const fixation = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div style="text-align:center; font-size:48px; color:#999;">+</div>',
    choices: "NO_KEYS",
    trial_duration: 400
  };

  // Main trial
  const trial = {
    type: jsPsychHtmlButtonResponse,
    stimulus: jsPsych.timelineVariable('stimulus_display'),
    choices: ['Sequence A (left)', 'Sequence B (right)'],
    button_html: styledBtn,
    data: {
      sequence_a: jsPsych.timelineVariable('sequence_a'),
      sequence_b: jsPsych.timelineVariable('sequence_b'),
      task: 'judgment'
    },
    on_finish: function(data) {
      // response 0 = chose A (left), 1 = chose B (right)
      data.chose_left = (data.response === 0) ? 1 : 0;
    }
  };

  timeline.push({
    timeline: [fixation, trial],
    timeline_variables: trialVariables,
    randomize_order: true
  });

  // Debrief
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <h2>Thank you!</h2>
      <p style="max-width:560px; text-align:left; margin:auto;">
        You have completed the study. Your responses have been recorded.
      </p>
      <p style="max-width:560px; text-align:left; margin:auto;">
        This study examines how people perceive randomness in sequences of coin flips.
        People often have systematic intuitions about what random sequences look like — for example,
        expecting frequent alternations between heads and tails — even when true randomness
        does not follow any such pattern. Your responses help us understand these intuitions.
      </p>
      <br>
    `,
    choices: ['Finish'],
    button_html: styledBtn
  });

  jsPsych.run(timeline);
</script>
</html>
