models:
- name: equally_likely
  rationale: 'People judge a sequence as more random the closer its proportion of
    heads is to 50%.

    '
- name: alternation_rate
  rationale: 'People judge a sequence as more random if its proportion of alternations
    is closer to their subjective ideal alternation rate.

    '
- name: bayesian_fair_coin
  rationale: 'Observers compare two binary sequences via the log Bayes factor between
    a fair-coin null and a biased-coin alternative.

    '
- name: inner_loop_model
  rationale: 'Best PyMC model found by the inner model-improvement loop.

    '
- name: subjective_markov_evidence
  rationale: 'Observers evaluate randomness by computing the log Bayes factor of the
    sequence''s transitions under a subjective ideal Markov process versus a purely
    independent fair coin.

    '
- name: absolute_alternation_deviation
  rationale: 'People judge a sequence as less random the further its number of alternations
    deviates from the expected number under their subjective ideal rate, computing
    distance in absolute counts rather than proportions.

    '
- name: iter0_candidate0
  rationale: Observers evaluate the randomness of a sequence by computing the true
    log Bayes factor between a fair-coin null and a biased-coin alternative, marginalizing
    over possible alternative biases using a subjective Beta prior instead of comparing
    to a single fixed bias.
- name: iter0_candidate1
  rationale: Observers evaluate the randomness of a sequence based on its longest
    unbroken streak of identical outcomes. They use the length of this maximum run
    as a heuristic for non-randomness, judging sequences with longer streaks as less
    random.
- name: iter0_candidate2
  rationale: Observers evaluate the randomness of a sequence using a point-estimate
    log-likelihood ratio rather than full Bayesian integration. They estimate the
    sequence's bias by smoothing the empirical proportion of heads with subjective
    pseudo-counts, and judge the sequence as less random the more its likelihood under
    this estimated bias exceeds its likelihood under a fair coin.
- name: iter1_candidate0
  rationale: Refining the hypothesis that observers track the frequency of heads,
    we propose they evaluate subjective randomness using a simple directional heuristic.
    Rather than penalizing symmetric deviations from a 50% proportion, observers judge
    a sequence as more random simply if it contains a greater absolute number of heads.
- name: iter1_candidate1
  rationale: Observers evaluate the randomness of a binary sequence using a simple
    directional heuristic based on alternations. Rather than penalizing deviations
    from a specific ideal rate, they judge a sequence as more random simply if it
    contains a higher proportion of alternations.
