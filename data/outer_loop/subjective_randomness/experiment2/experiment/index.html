<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subjective Randomness Experiment</title>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    .sequence-container {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin: 40px 0;
      font-size: 24px;
      font-family: monospace;
    }
    .sequence {
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #f9f9f9;
      min-width: 150px;
    }
  </style>
</head>
<body></body>
<script>
  const STIMULI = [
    {"sequence_a": "HHTHHTTT", "sequence_b": "THH", "eig": 0.151409},
    {"sequence_a": "HHT", "sequence_b": "TTTTHHHH", "eig": 0.140561},
    {"sequence_a": "HHHHTTTT", "sequence_b": "HHHHHHT", "eig": 0.138849},
    {"sequence_a": "HHTH", "sequence_b": "HHTTHTHT", "eig": 0.136923},
    {"sequence_a": "HTHTTTHT", "sequence_b": "THTHTHTH", "eig": 0.133778},
    {"sequence_a": "HHHHHTH", "sequence_b": "HHHTTTT", "eig": 0.122234},
    {"sequence_a": "THHTHTHT", "sequence_b": "HHTHH", "eig": 0.110629},
    {"sequence_a": "TTTHT", "sequence_b": "TTTHTHHH", "eig": 0.109669},
    {"sequence_a": "HTHTHHT", "sequence_b": "THTHTHT", "eig": 0.106867},
    {"sequence_a": "TTTTTHHH", "sequence_b": "THTTT", "eig": 0.105463},
    {"sequence_a": "TTTHTHTH", "sequence_b": "THT", "eig": 0.103839},
    {"sequence_a": "TTHT", "sequence_b": "HTHHTHT", "eig": 0.102096},
    {"sequence_a": "HHHHH", "sequence_b": "TTHHHHHH", "eig": 0.101707},
    {"sequence_a": "THTHTHT", "sequence_b": "TTHTHTTH", "eig": 0.101516},
    {"sequence_a": "HHHTHTTH", "sequence_b": "THH", "eig": 0.101219},
    {"sequence_a": "HHTHHTHH", "sequence_b": "HTHTTHTH", "eig": 0.100172},
    {"sequence_a": "THTHTH", "sequence_b": "THTHHT", "eig": 0.099851},
    {"sequence_a": "TTHTTTTH", "sequence_b": "HHH", "eig": 0.097493},
    {"sequence_a": "HTHHHHHT", "sequence_b": "TTTTTTTT", "eig": 0.096858},
    {"sequence_a": "THHTHTH", "sequence_b": "HHT", "eig": 0.096545},
    {"sequence_a": "TTTTT", "sequence_b": "HHHHTTT", "eig": 0.096485},
    {"sequence_a": "HHHHHHHH", "sequence_b": "TTTTTTH", "eig": 0.092572},
    {"sequence_a": "HTHTH", "sequence_b": "TTHTHTTT", "eig": 0.090911},
    {"sequence_a": "HHTHHHTT", "sequence_b": "TTTTHT", "eig": 0.09022},
    {"sequence_a": "HTT", "sequence_b": "THHHTTHH", "eig": 0.087717},
    {"sequence_a": "TTHHHHH", "sequence_b": "THHH", "eig": 0.087185},
    {"sequence_a": "HTHHH", "sequence_b": "HTTHTHT", "eig": 0.086221},
    {"sequence_a": "THHTTTT", "sequence_b": "HHHTTTT", "eig": 0.085404},
    {"sequence_a": "THTHHTHT", "sequence_b": "TTTH", "eig": 0.084973},
    {"sequence_a": "THTTT", "sequence_b": "THHTHTH", "eig": 0.083961}
  ];

  const jsPsych = initJsPsych({
    on_finish: function() {
      // Expose data globally for local collection tools
      window.__experimentData = jsPsych.data.get().values();
    }
  });

  const timeline = [];

  const instructions = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <h2>Instructions</h2>
      <p>In this experiment, you will see two sequences of coin flips (Heads and Tails).</p>
      <p>Your task is to choose which sequence looks <strong>more random</strong>.</p>
      <p>Click "Start" when you are ready.</p>
    `,
    choices: ['Start']
  };
  timeline.push(instructions);

  const fixation = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div style="font-size: 60px;">+</div>',
    choices: "NO_KEYS",
    trial_duration: 500
  };

  const trials = STIMULI.map((s, index) => {
    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <p style="font-size: 20px; font-weight: bold;">Which sequence looks more random?</p>
        <div class="sequence-container">
          <div class="sequence">
            <div style="font-size: 16px; color: #555; margin-bottom: 10px;">Sequence A</div>
            <div>${s.sequence_a}</div>
          </div>
          <div class="sequence">
            <div style="font-size: 16px; color: #555; margin-bottom: 10px;">Sequence B</div>
            <div>${s.sequence_b}</div>
          </div>
        </div>
      `,
      choices: ['Sequence A (Left)', 'Sequence B (Right)'],
      data: {
        task: 'judgment',
        trial_index: index,
        sequence_a: s.sequence_a,
        sequence_b: s.sequence_b,
        eig: s.eig
      },
      on_finish: function(data) {
        // Record 1 if they chose A (Left), 0 if they chose B (Right)
        data.chose_left = (data.response === 0) ? 1 : 0;
      }
    };
  });

  // Randomize trial order just to be safe
  const shuffled_trials = jsPsych.randomization.shuffle(trials);

  for (let i = 0; i < shuffled_trials.length; i++) {
    timeline.push(fixation);
    timeline.push(shuffled_trials[i]);
  }

  const debrief = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <h2>Finished!</h2>
      <p>Thank you for participating.</p>
      <p>Click "End" to complete the experiment.</p>
    `,
    choices: ['End']
  };
  timeline.push(debrief);

  jsPsych.run(timeline);
</script>
</html>
