models:
- name: rational_markov
  rationale: A rational model of representativeness where subjects compare the likelihood
    of the sequence under a random generative process (fair coin) versus a regular
    generative process (a Markov model with an inferred transition probability).
- name: alternation_heuristic
  rationale: "A simple heuristic model where participants judge randomness based on\
    \ the rate of alternations, preferring sequences with a higher proportion of H\u2194\
    T transitions."
- name: proportion_heuristic
  rationale: A representativeness heuristic model where observers prefer sequences
    whose head proportion is closer to 0.5, ignoring sequence length and transition
    probabilities.
