models:
- name: prototype_similarity
  rationale: 'Random-looking sequences are close to a prototype with balanced H/T
    counts

    and an ideal alternation rate.

    '
- name: encoding_compressibility
  rationale: 'Random-looking sequences are those with low simple-description penalties:

    long runs, periodic templates, and imbalance.

    '
- name: bayesian_diagnosticity
  rationale: 'Random-looking sequences are diagnostic of a fair coin over salient

    non-random alternatives: alternating, biased, and streaky generators.

    '
- name: inner_loop_model
  rationale: Best PyMC model found by the inner model-improvement loop.
- name: fewer_heads_proportion
  rationale: People judge the randomness of a sequence by its proportion of heads,
    holding a biased belief that sequences containing a lower proportion of heads
    are more representative of a random coin.
- name: short_streaks
  rationale: People judge the randomness of a sequence by looking solely at the length
    of its longest streak of identical outcomes, judging sequences with a shorter
    maximum run length as more random.
- name: iter0_candidate0
  rationale: People judge the randomness of a sequence strictly by the absolute number
    of heads it contains, rather than the proportion of heads. Sequences are penalized
    directly for their total count of heads, such that fewer absolute heads are judged
    as more representative of a random process, regardless of the sequence's length.
- name: iter0_candidate1
  rationale: People judge the randomness of a sequence by its Bayesian diagnosticity
    for a fair coin, specifically contrasting it against an alternative hypothesis
    that the generative process is biased towards heads. They evaluate the log-likelihood
    ratio of the sequence under a fair coin versus a heads-biased coin, judging sequences
    that provide stronger evidence against the heads bias as more random.
- name: iter0_candidate2
  rationale: People evaluate the randomness of a sequence solely by checking whether
    its proportion of heads matches the expectation of a fair coin (0.5). Sequences
    whose proportion of heads is closer to 0.5 are consistently judged as being more
    representative of a random process.
- name: iter1_candidate0
  rationale: People judge the randomness of a sequence strictly by the absolute number
    of heads it contains, but their sensitivity to this count diminishes logarithmically.
    Sequences are penalized based on the logarithm of their head count, meaning the
    perceived difference in randomness between 1 and 2 heads is larger than the difference
    between 8 and 9.
- name: iter1_candidate2
  rationale: People judge the randomness of a sequence strictly by the absolute number
    of heads it contains, but their penalty for heads grows quadratically. Each additional
    head decreases the perceived randomness more than the previous one, meaning the
    perceived difference in randomness between 8 and 9 heads is much larger than between
    1 and 2.
