models:
- name: prototype_similarity
  rationale: Random-looking sequences are close to a prototype with balanced H/T counts
    and an ideal alternation rate.
- name: encoding_compressibility
  rationale: 'Random-looking sequences are those with low simple-description penalties:
    long runs, periodic templates, and imbalance.'
- name: bayesian_diagnosticity
  rationale: 'Random-looking sequences are diagnostic of a fair coin over salient
    non-random alternatives: alternating, biased, and streaky generators.'
- name: raw_alternation_count
  rationale: People perceive sequences with a higher raw count of alternations as
    more random, regardless of sequence length.
- name: high_alternation_rate
  rationale: People judge sequence randomness based on the proportion of alternations,
    perceiving sequences with a higher alternation rate as strictly more random.
- name: ideal_alternation_rate
  rationale: People judge sequence randomness by comparing the proportion of alternating
    outcomes to a subjective ideal alternation rate, perceiving sequences closer to
    this ideal as more random.
- name: imbalance_with_lapse
  rationale: People judge sequence randomness based purely on outcome frequencies,
    perceiving sequences with a greater proportion imbalance as more random, but their
    judgments are moderated by a constant lapse rate representing random guessing.
- name: quadratic_imbalance
  rationale: People judge sequence randomness based on outcome frequencies, with perceived
    randomness growing quadratically as the proportion of heads and tails deviates
    further from a balanced distribution.
- name: inner_loop_model
  rationale: Best PyMC model found by the inner model-improvement loop.
