models:
- name: prototype_similarity
  rationale: 'Random-looking sequences are close to a prototype with balanced H/T
    counts

    and an ideal alternation rate.

    '
- name: encoding_compressibility
  rationale: 'Random-looking sequences are those with low simple-description penalties:

    long runs, periodic templates, and imbalance.

    '
- name: bayesian_diagnosticity
  rationale: 'Random-looking sequences are diagnostic of a fair coin over salient

    non-random alternatives: alternating, biased, and streaky generators.

    '
- name: iter0_candidate0
  rationale: 'People judge sequence randomness based on the Bayesian diagnosticity
    of a fair coin compared to a single salient alternative: a "streaky" Markov generator
    that has an innate tendency to repeat previous outcomes. Sequences that are more
    likely under the fair coin than the streaky alternative are perceived as more
    random.'
- name: iter0_candidate1
  rationale: 'People judge sequence randomness based purely on the alternation rate
    heuristic: they compare the proportion of alternating outcomes in the sequence
    to a subjective ideal alternation rate. Sequences whose alternation rate is closer
    to this subjective ideal are perceived as more random.'
- name: iter0_candidate2
  rationale: 'People judge sequence randomness purely based on the relative frequencies
    of outcomes: sequences with a smaller imbalance between the number of heads and
    tails are perceived as more random.'
- name: iter1_candidate0
  rationale: People judge sequence randomness based purely on outcome frequencies,
    paradoxically perceiving sequences with a greater imbalance between the number
    of heads and tails as more random.
- name: iter1_candidate1
  rationale: People judge sequence randomness based on the Bayesian diagnosticity
    of a biased coin relative to a fair coin. Sequences that provide stronger evidence
    for a biased coin (which can favor either heads or tails) over a fair coin are
    perceived as more random.
- name: iter1_candidate2
  rationale: People judge sequence randomness based purely on the maximum run length
    heuristic. They assess the length of the longest continuous streak of identical
    outcomes in each sequence, perceiving the sequence with the shorter maximum streak
    as more random.
