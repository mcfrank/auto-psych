models:
- name: prototype_similarity
  rationale: 'Random-looking sequences are close to a prototype with balanced H/T
    counts

    and an ideal alternation rate.

    '
- name: encoding_compressibility
  rationale: 'Random-looking sequences are those with low simple-description penalties:

    long runs, periodic templates, and imbalance.

    '
- name: bayesian_diagnosticity
  rationale: 'Random-looking sequences are diagnostic of a fair coin over salient

    non-random alternatives: alternating, biased, and streaky generators.

    '
- name: iter0_candidate0
  rationale: People judge the randomness of a sequence by its similarity to a prototype,
    but rather than expecting balanced outcomes, their prototype expects a sequence
    to be dominated by heads. Sequences with a higher proportion of heads are perceived
    as closer to the prototype and therefore more random.
- name: iter0_candidate1
  rationale: People rely on a simple "heads-equal-randomness" heuristic, where heads
    are viewed as independent random events and tails are viewed as non-random deterministic
    events. Consequently, the perceived randomness of a sequence strictly and monotonically
    increases with its proportion of heads.
- name: iter0_candidate2
  rationale: People evaluate the randomness of a sequence strictly based on the absolute
    number of heads it contains. They apply a simple additive heuristic where each
    additional head linearly increases the perceived randomness score, disregarding
    the sequence length and outcome order. When comparing two sequences, they are
    more likely to choose the sequence with the higher total head count as the more
    random one.
- name: iter1_candidate0
  rationale: People evaluate the randomness of a sequence based on the absolute number
    of heads it contains, but following the Weber-Fechner law for numerosity perception,
    their sensitivity to additional heads exhibits diminishing returns. When comparing
    two sequences, they compute a randomness score that grows logarithmically with
    the absolute head count plus a constant.
- name: iter1_candidate2
  rationale: People evaluate the randomness of a sequence by calculating the excess
    of heads over tails, expecting random sequences to be heavily biased. They compute
    a randomness score equal to the number of heads minus the number of tails, perceiving
    sequences with a greater excess of heads as more random.
