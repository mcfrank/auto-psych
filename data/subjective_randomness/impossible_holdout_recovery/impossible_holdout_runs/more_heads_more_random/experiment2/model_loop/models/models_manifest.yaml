models:
- name: prototype_similarity
  rationale: 'Random-looking sequences are close to a prototype with balanced H/T
    counts

    and an ideal alternation rate.

    '
- name: encoding_compressibility
  rationale: 'Random-looking sequences are those with low simple-description penalties:

    long runs, periodic templates, and imbalance.

    '
- name: bayesian_diagnosticity
  rationale: 'Random-looking sequences are diagnostic of a fair coin over salient

    non-random alternatives: alternating, biased, and streaky generators.

    '
- name: inner_loop_model
  rationale: 'People evaluate the randomness of a sequence strictly based on the absolute
    number of heads it contains.

    '
- name: length_scaled_head_difference
  rationale: 'People evaluate randomness primarily by the absolute number of heads,
    but their sensitivity to the difference in head counts between two sequences is
    diminished when the overall length of the sequences being compared is larger.

    '
- name: squared_heads_heuristic
  rationale: 'People evaluate the randomness of a sequence strictly based on the squared
    number of heads it contains, amplifying the perception of randomness for sequences
    with very high head counts.

    '
- name: iter0_candidate1
  rationale: People evaluate the randomness of a sequence strictly based on the proportion
    of heads it contains, perceiving sequences with a higher proportion of heads as
    more random.
- name: iter0_candidate2
  rationale: People evaluate the randomness of a sequence strictly based on the cubed
    number of heads it contains. This mechanism creates an extreme, accelerating non-linear
    preference where sequences with high head counts are overwhelmingly perceived
    as more random.
- name: iter1_candidate0
  rationale: People evaluate the randomness of a sequence based solely on the number
    of heads it contains, but their perception of randomness scales as a power-law
    function of the head count rather than strictly linearly or quadratically. The
    model infers this exponent to capture exactly how marginal increases in head counts
    shape judgments.
- name: iter1_candidate2
  rationale: People evaluate the randomness of a sequence strictly based on the absolute
    number of heads it contains. However, their choices are subject to a constant
    lapse rate, meaning they occasionally guess randomly regardless of the head counts,
    rather than perfectly following a logistic choice curve.
