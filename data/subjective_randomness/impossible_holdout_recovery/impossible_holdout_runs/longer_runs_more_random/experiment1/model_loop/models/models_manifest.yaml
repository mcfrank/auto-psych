models:
- name: prototype_similarity
  rationale: 'Random-looking sequences are close to a prototype with balanced H/T
    counts

    and an ideal alternation rate.

    '
- name: encoding_compressibility
  rationale: 'Random-looking sequences are those with low simple-description penalties:

    long runs, periodic templates, and imbalance.

    '
- name: bayesian_diagnosticity
  rationale: 'Random-looking sequences are diagnostic of a fair coin over salient

    non-random alternatives: alternating, biased, and streaky generators.

    '
- name: iter0_candidate0
  rationale: People judge a sequence as random based on its similarity to an ideal
    prototype, but they evaluate the sequence by its maximum absolute deviation (L-infinity
    norm) from ideal head balance and expected alternation rate, penalizing only its
    most salient flaw.
- name: iter0_candidate1
  rationale: People judge the randomness of a sequence solely by evaluating its alternation
    rate. Influenced by the Gambler's Fallacy, they expect random sequences to self-correct
    and alternate more frequently than chance, so they perceive a sequence as more
    random the closer its alternation rate is to their subjective ideal rate.
- name: iter0_candidate2
  rationale: People judge the randomness of a sequence by focusing solely on its longest
    streak of identical outcomes. Because they believe true randomness naturally produces
    long streaks, they perceive a sequence as more random the longer its maximum run
    is relative to the total sequence length.
- name: iter1_candidate0
  rationale: People judge the randomness of a sequence by focusing solely on its absolute
    longest streak of identical outcomes. Instead of adjusting for the total sequence
    length, they perceive a sequence as more random simply by counting the raw number
    of consecutive identical outcomes in its longest run.
- name: iter1_candidate1
  rationale: People judge the randomness of a sequence by comparing its longest streak
    of identical outcomes to their subjective ideal streak length. They perceive a
    sequence as more random the closer its maximum run proportion is to this expected
    ideal length, penalizing streaks that are either suspiciously short or excessively
    long.
- name: iter1_candidate2
  rationale: People judge the randomness of a sequence solely by evaluating the overall
    balance of its outcomes. They perceive a sequence as more random the closer its
    proportion of heads is to exactly fifty percent, strictly penalizing any deviation
    from perfect balance.
