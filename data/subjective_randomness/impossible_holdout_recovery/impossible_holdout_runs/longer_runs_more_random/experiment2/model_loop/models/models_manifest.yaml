models:
- name: prototype_similarity
  rationale: 'Random-looking sequences are close to a prototype with balanced H/T
    counts

    and an ideal alternation rate.

    '
- name: encoding_compressibility
  rationale: 'Random-looking sequences are those with low simple-description penalties:

    long runs, periodic templates, and imbalance.

    '
- name: bayesian_diagnosticity
  rationale: 'Random-looking sequences are diagnostic of a fair coin over salient

    non-random alternatives: alternating, biased, and streaky generators.

    '
- name: inner_loop_model
  rationale: 'People judge the randomness of a sequence by focusing solely on its
    longest streak of identical outcomes. Because they believe true randomness naturally
    produces long streaks, they perceive a sequence as more random the longer its
    maximum run is relative to the total sequence length.

    '
- name: ideal_run_proportion
  rationale: 'People judge the randomness of a sequence by comparing its longest streak
    of identical outcomes to their subjective ideal streak proportion. They perceive
    a sequence as more random the closer its maximum run proportion is to this expected
    ideal length, penalizing streaks that are either suspiciously short or excessively
    long.

    '
- name: absolute_ideal_run
  rationale: 'People judge the randomness of a sequence by comparing its absolute
    longest streak of identical outcomes to a subjective ideal absolute streak length,
    regardless of total sequence length.

    '
- name: pure_periodicity_penalty
  rationale: 'People judge the randomness of a sequence strictly by penalizing its
    periodicity, perceiving sequences with fewer short, repeating patterns as more
    random.

    '
- name: iter0_candidate0
  rationale: People judge the randomness of a sequence by focusing solely on its longest
    streak of identical outcomes. They evaluate this streak as a simple ratio of the
    maximum run length to the total sequence length, perceiving a sequence as more
    random the larger this absolute fraction is.
- name: iter0_candidate1
  rationale: People judge the randomness of a sequence by comparing its alternation
    rate to their subjective ideal alternation rate. They perceive a sequence as more
    random the closer its alternation proportion is to this expected ideal, penalizing
    sequences that either alternate too rarely (streaky) or too frequently (perfectly
    alternating).
- name: iter0_candidate2
  rationale: People judge the randomness of a sequence based solely on the overall
    balance of its outcomes. They perceive a sequence as less random the more its
    proportion of heads deviates from an even split, heavily penalizing any imbalance.
- name: iter1_candidate0
  rationale: People judge the randomness of a sequence by focusing solely on its longest
    streak of identical outcomes relative to the total sequence length. However, their
    perception of this proportion is non-linear; they subjectively evaluate the normalized
    maximum run length according to a power law before comparing the sequences, allowing
    for either diminishing or accelerating marginal returns for longer streaks.
- name: iter1_candidate1
  rationale: People judge the randomness of a sequence simply by the absolute length
    of its longest streak of identical outcomes. They perceive a sequence as more
    random the longer its absolute maximum run is, completely ignoring the total length
    of the sequence in their evaluation.
