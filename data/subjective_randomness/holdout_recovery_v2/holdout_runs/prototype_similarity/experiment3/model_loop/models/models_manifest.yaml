models:
- name: encoding_compressibility
  rationale: 'Random-looking sequences are those with low simple-description penalties:

    long runs, periodic templates, and imbalance.

    '
- name: bayesian_diagnosticity
  rationale: 'Random-looking sequences are diagnostic of a fair coin over salient

    non-random alternatives: alternating, biased, and streaky generators.

    '
- name: alternation_prototype
  rationale: 'People judge a sequence as more random when its alternation rate is
    closer

    (L1 distance) to an internalized prototype value that is biased above 0.5,

    reflecting the well-documented human tendency to overestimate alternation in

    random sequences.

    '
- name: inner_loop_model
  rationale: Best PyMC model found by the inner model-improvement loop.
- name: fair_coin_run_baseline
  rationale: 'People judge a sequence as more random when its maximum run length is
    short relative

    to the expected maximum run length for a fair-coin sequence of the same length,
    where

    the fair-coin baseline scales as kappa * log2(n) and kappa is a learned cognitive
    parameter.

    '
- name: iter0_candidate0
  rationale: "People judge sequences by how diagnostic they are of a fair-coin process\
    \ against three salient non-random alternatives \u2014 alternating, biased, and\
    \ streaky generators \u2014 exactly as in the leading model, but with the alternating\
    \ generator's switch probability learned from data rather than fixed at the canonical\
    \ 0.95. This tests whether people's internal representation of \"how alternating\"\
    \ a sequence must look to seem non-random is flexible, while the streaky generator's\
    \ switch probability remains fixed at its canonical value of 0.15."
- name: iter0_candidate1
  rationale: '# Hypothesis: Periodicity Aversion


    People judge one sequence as more random than another based solely on how much
    periodic structure each sequence contains. A sequence with a pronounced repeating
    beat pattern looks non-random; a sequence with weak or absent periodic structure
    looks random. When choosing which of two sequences is more random, people pick
    the one with lower periodicity, and their sensitivity to periodicity differences
    is a single learned parameter.'
- name: iter0_candidate2
  rationale: "# Hypothesis: Head/Tail Balance\n\nPeople judge a sequence as more random\
    \ when the proportion of heads is closer to 0.5 \u2014 a perfectly balanced sequence\
    \ looks like the output of a fair coin, while a heavily skewed sequence looks\
    \ biased. When choosing which of two sequences is more random, people simply pick\
    \ the one whose proportion of heads is nearer to perfect balance, with a single\
    \ sensitivity parameter governing how sharply they discriminate between imbalance\
    \ levels."
- name: iter1_candidate0
  rationale: "People judge sequences by how diagnostic they are of a fair-coin process\
    \ against three salient non-random alternatives \u2014 alternating, biased, and\
    \ streaky generators \u2014 exactly as in the leading model. However, the characteristic\
    \ bias level of the \"biased\" generator prototype (how extreme the head-tail\
    \ imbalance must be to count as non-random) is not fixed at a canonical 0.85 but\
    \ is instead learned from the data, testing whether people's internal representation\
    \ of what makes a sequence look \"biased\" is at that conventional value or at\
    \ some other level."
- name: iter1_candidate1
  rationale: "# Hypothesis: Learned Streaky Generator Diagnosticity\n\nPeople judge\
    \ which sequence looks more random by computing how much better a fair coin explains\
    \ each sequence compared with the most compelling non-random alternative \u2014\
    \ an alternating, biased-coin, or streaky (run-generating) generator. The alternating\
    \ generator's switch probability and the biased generator's bias level are fixed\
    \ at canonical values, but the streaky generator's characteristic switch probability\
    \ \u2014 how likely it is to stay on the same outcome \u2014 is a flexible cognitive\
    \ parameter that people learn from experience rather than inheriting from a fixed\
    \ prototype."
- name: iter1_candidate2
  rationale: '# Hypothesis: Absolute Maximum-Run Aversion


    People judge a sequence as more random when its longest unbroken streak of the
    same outcome is shorter. They treat any long run as a direct signal of non-randomness,
    comparing the two sequences'' maximum run lengths and picking the one with the
    shorter streak, with a single sensitivity parameter governing how sharply they
    discriminate.'
