models:
- name: prototype_similarity
  rationale: 'Random-looking sequences are close to a prototype with balanced H/T
    counts

    and an ideal alternation rate.

    '
- name: bayesian_diagnosticity
  rationale: 'Random-looking sequences are diagnostic of a fair coin over salient

    non-random alternatives: alternating, biased, and streaky generators.

    '
- name: iter0_candidate0
  rationale: People choose the sequence that is harder to compress. A sequence with
    high periodicity can be described compactly as a repeating pattern, which makes
    it feel structured and non-random. The sequence with lower periodicity resists
    this kind of compact description and therefore appears more random.
- name: iter1_candidate0
  rationale: "People judge a sequence as more random when it has shorter maximum runs.\
    \ A long run (e.g., HHHHH) can be compactly described via run-length encoding\
    \ \u2014 just name the element and its length \u2014 making the sequence feel\
    \ structured and non-random. The sequence whose longest run is shorter resists\
    \ this compact description and therefore appears more random."
