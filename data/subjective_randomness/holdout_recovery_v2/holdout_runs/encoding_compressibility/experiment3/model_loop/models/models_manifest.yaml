models:
- name: prototype_similarity
  rationale: 'Random-looking sequences are close to a prototype with balanced H/T
    counts

    and an ideal alternation rate.

    '
- name: bayesian_diagnosticity
  rationale: 'Random-looking sequences are diagnostic of a fair coin over salient

    non-random alternatives: alternating, biased, and streaky generators.

    '
- name: max_run_length
  rationale: 'People judge a sequence as more random when its longest consecutive
    run is

    shorter, because a long run is the most compact single-symbol run-length

    encoding unit and is the strongest single cue that the sequence is structured.

    '
- name: rle_description_length
  rationale: 'People judge a sequence as more random when its run-length encoding
    requires

    more blocks (alternations + 1 normalized by length), predicting a monotonic

    relationship between alternation rate and perceived randomness with no ideal rate.

    '
- name: inner_loop_model
  rationale: Best PyMC model found by the inner model-improvement loop.
- name: head_balance
  rationale: 'People judge a sequence as more random when its head proportion is closer
    to 0.5,

    assessing perceived randomness solely by whether the sequence looks like it came

    from a fair (unbiased) coin and ignoring alternation patterns and run structure.

    '
- name: iter0_candidate0
  rationale: "People judge a sequence as more random when its head count is most combinatorially\
    \ plausible under a fair coin \u2014 that is, when the number of heads is closest\
    \ to the mode of the binomial distribution. They compare two sequences by log\
    \ C(n, h), the log of the number of equally-likely arrangements with that head\
    \ count, penalizing imbalance in proportion to its combinatorial implausibility\
    \ rather than its raw magnitude."
- name: iter0_candidate1
  rationale: "People judge a sequence as less random when it contains detectable periodic\
    \ structure \u2014 a regular repeating pattern is the strongest cue that the sequence\
    \ was generated by a rule rather than chance. When comparing two sequences, people\
    \ prefer the one with lower periodicity as the more random-looking option."
- name: iter0_candidate2
  rationale: "People judge a sequence as more random when its head proportion is closer\
    \ to 0.5, because a balanced sequence looks most consistent with a fair coin.\
    \ On some fraction of trials, however, they lapse \u2014 failing to attend to\
    \ the stimuli \u2014 and respond randomly. The core mechanism is pure head-proportion\
    \ balance (as in head_balance), extended by a single lapse-rate parameter that\
    \ absorbs inattentive or guessing trials."
- name: iter1_candidate0
  rationale: 'People judge a sequence as more random when its head proportion is closer
    to 0.5, but their sensitivity to imbalance is quadratic rather than linear: each
    additional unit of deviation from 50% heads incurs a disproportionately larger
    randomness penalty, so mild imbalance is nearly ignored while extreme imbalance
    is strongly penalized. This is a pure balance-checking mechanism whose discrimination
    power accelerates with distance from the prototype, differing from the linear
    head_balance model in how imbalance is psychologically scaled.'
- name: iter1_candidate1
  rationale: "People judge a sequence as more random when its alternation rate is\
    \ closer to a subjective ideal \u2014 an internal standard for how often a \"\
    typical\" random sequence changes between heads and tails. When comparing two\
    \ sequences, they prefer the one whose alternation rate deviates less from this\
    \ ideal, treating both too much streakiness and too much regularity as evidence\
    \ of non-randomness. The ideal rate is a free parameter, allowing the model to\
    \ capture whether people's internal standard sits at, above, or below the true\
    \ fair-coin rate of 0.5."
- name: iter1_candidate2
  rationale: "People judge a sequence as more random when its Shannon entropy is higher\
    \ \u2014 that is, when its head proportion is closest to 0.5 in information-theoretic\
    \ terms. Unlike a linear balance model, entropy penalizes extreme imbalance (p\
    \ near 0 or 1) disproportionately more than mild imbalance (p near 0.4 or 0.6),\
    \ so only strongly biased sequences lose randomness credit while mildly unequal\
    \ sequences are treated as nearly equivalent to balanced ones. This is a single-cue,\
    \ head-proportion-only model that refines the linear balance hypothesis with a\
    \ specific nonlinear (entropy) scaling."
