models:
- name: prototype_similarity
  rationale: 'Random-looking sequences are close to a prototype with balanced H/T
    counts

    and an ideal alternation rate.

    '
- name: encoding_compressibility
  rationale: 'Random-looking sequences are those with low simple-description penalties:

    long runs, periodic templates, and imbalance.

    '
- name: bayesian_diagnosticity
  rationale: 'Randomness is the log-likelihood ratio of a fair coin versus a regular

    process: a mixture of a complexity-penalized motif process (Griffiths et

    al. 2018) and a biased coin. Merges the former diagnosticity and

    statistical-inference accounts.

    '
- name: window_typicality
  rationale: 'Random-looking sequences have a longest run typical of a fair coin seen

    through a limited memory window; over-long streaks look non-random (Hahn &

    Warren 2009).

    '
- name: iter0_candidate0
  rationale: People judge the randomness of a sequence based on its Gaussian similarity
    to an ideal subjective prototype, meaning the sequence's perceived randomness
    decays exponentially with its squared distance in feature space (proportion of
    heads and alternations) from the expected prototype. This formulation penalizes
    extreme deviations more severely than a linear distance metric.
- name: iter0_candidate1
  rationale: People judge the randomness of a sequence by evaluating the statistical
    typicality of its macroscopic features. They compute the joint Binomial probability
    of observing the sequence's specific number of heads and alternations under their
    subjective expectations for a random process, perceiving sequences with highly
    improbable feature counts as less random.
- name: iter0_candidate2
  rationale: People judge the randomness of a sequence by the diversity of its run
    lengths, perceiving sequences as more random when they contain an unpredictable
    mix of short and long streaks, which is evaluated as the Shannon entropy of the
    sequence's run-length distribution.
- name: iter1_candidate0
  rationale: People judge the randomness of a sequence by evaluating its distance
    from an ideal subjective prototype, but their sensitivity to deviations follows
    a psychophysical power law with a compressive exponent. This sub-linear scaling
    means that while initial departures from the prototype are penalized, further
    deviations toward extremes (like perfect imbalance) result in diminishing additional
    penalties.
- name: iter1_candidate1
  rationale: People judge the randomness of a sequence by comparing it to an ideal
    prototype, but they evaluate its departure from this ideal using the absolute
    difference in the raw counts of heads and alternations, rather than their proportions.
    By using unnormalized counts, people naturally exhibit length-dependent tolerance,
    applying much smaller penalties to perfectly imbalanced short sequences than to
    perfectly imbalanced long sequences.
- name: iter1_candidate2
  rationale: People judge the randomness of a sequence by comparing its features (head
    proportion and alternation rate) to a subjective ideal, but their psychological
    penalty for deviations is scaled by the square root of the sequence length, reflecting
    an intuitive sensitivity to the standard error of small samples. This statistical-evidence
    weighting means that while people still penalize non-ideal proportions, they are
    far more tolerant of extreme imbalance in very short sequences where the small
    sample size provides weak evidence of non-randomness.
