models:
- name: prototype_similarity
  rationale: Random-looking sequences are close to a prototype with balanced H/T counts
    and an ideal alternation rate.
- name: encoding_compressibility
  rationale: 'Random-looking sequences are those with low simple-description penalties:
    long runs, periodic templates, and imbalance.'
- name: bayesian_diagnosticity
  rationale: 'Randomness is the log-likelihood ratio of a fair coin versus a regular
    process: a mixture of a complexity-penalized motif process (Griffiths et al. 2018)
    and a biased coin. Merges the former diagnosticity and statistical-inference accounts.'
- name: window_typicality
  rationale: Random-looking sequences have a longest run typical of a fair coin seen
    through a limited memory window; over-long streaks look non-random (Hahn & Warren
    2009).
- name: inner_loop_model
  rationale: People judge the randomness of a sequence by comparing its features (head
    proportion and alternation rate) to a subjective ideal, but their psychological
    penalty for deviations is scaled by the square root of the sequence length, reflecting
    an intuitive sensitivity to the standard error of small samples.
- name: smoothed_prototype_distance
  rationale: People judge the randomness of a sequence by comparing its feature proportions
    to a subjective ideal, but they estimate these proportions using Bayesian smoothing
    with subjective pseudo-counts, naturally tolerating extreme imbalances in short
    sequences because their prior pulls the estimates toward the ideal.
- name: falk_konold_complexity
  rationale: People judge the randomness of a sequence by its structural complexity
    when parsed into continuous alternating and repeating sub-sequences (Falk & Konold's
    difficulty of encoding), perceiving sequences with a lower rate of sub-sequences
    as simpler and therefore less random.
- name: iter0_candidate0
  rationale: People judge the randomness of a sequence by its smoothed distance from
    a subjective prototype, but their ideal template includes an expectation for higher-order
    alternating motifs (like HTHT) in addition to basic heads/tails balance and simple
    bigram alternations.
- name: iter0_candidate2
  rationale: People judge the randomness of a sequence by its smoothed distance from
    a subjective prototype, but this prototype tracks the proportion of 4-item alternating
    motifs (like HTHT) instead of simple bigram alternations, viewing these longer,
    more complex alternations as the primary structural signature of local randomness.
- name: iter1_candidate0
  rationale: People judge the randomness of a sequence by comparing its feature proportions
    to a subjective ideal using Bayesian smoothing, but their sensitivity to these
    deviations follows a Gaussian-like generalization gradient. Instead of penalizing
    deviations linearly, they disproportionately penalize sequences that exhibit extreme,
    glaring deviations on any single feature dimension, while easily tolerating small
    differences from the prototype.
- name: iter1_candidate2
  rationale: People judge the randomness of a sequence by the probabilistic surprise
    of its macroscopic features (such as heads and alternations), rather than the
    likelihood of the specific sequence. They intuitively evaluate the exact Binomial
    probability of observing those specific feature counts under a subjective ideal
    model, naturally perceiving sequences with highly probable feature counts as more
    random while appropriately penalizing deviations more strictly in longer sequences.
