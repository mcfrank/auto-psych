models:
- name: prototype_similarity
  rationale: Random-looking sequences are close to a prototype with balanced H/T counts
    and an ideal alternation rate.
- name: encoding_compressibility
  rationale: Random-looking sequences are those with low simple-description penalties
    like long runs, periodic templates, and imbalance.
- name: bayesian_diagnosticity
  rationale: Randomness is the log-likelihood ratio of a fair coin versus a regular
    process (a mixture of a complexity-penalized motif process and a biased coin).
- name: window_typicality
  rationale: Random-looking sequences have a longest run typical of a fair coin seen
    through a limited memory window; over-long streaks look non-random.
- name: falk_konold_difficulty
  rationale: Random-looking sequences are those that are cognitively harder to encode
    into chunks, as quantified by Falk and Konold's Difficulty Predictor (the number
    of repetition motifs plus twice the number of alternation motifs) normalized by
    sequence length.
- name: manhattan_messy_prototype
  rationale: Random-looking sequences are judged by their Manhattan (absolute) distance
    to a messy prototype with a strictly positive ideal imbalance and an ideal alternation
    rate, with absolute-value penalties that are asymmetric for alternation rate.
- name: inner_loop_model
  rationale: Random-looking sequences are judged by an evidence accumulation process
    where each item in the sequence provides a baseline "weight of evidence" for randomness,
    which is then discounted by the sequence's quadratic deviation from a messy prototype
    (an ideal positive imbalance and ideal alternation rate).
- name: evidence_accumulation_per_run
  rationale: Random-looking sequences are judged by an evidence accumulation process
    where each distinct run (streak of identical outcomes) provides a baseline weight
    of evidence for randomness, which is then discounted by the sequence's quadratic
    deviation from a messy prototype.
- name: evidence_accumulation_periodicity
  rationale: Random-looking sequences are judged by an evidence accumulation process
    where baseline evidence is discounted by the sequence's deviation from a messy
    prototype consisting of an ideal imbalance and an ideal (low) periodicity.
- name: iter0_candidate0
  rationale: Random-looking sequences are judged by an evidence accumulation process
    where each item provides a baseline weight of evidence for randomness, which is
    then discounted by the sequence's quadratic deviation from a messy prototype defined
    by an ideal repeating-motif rate and an ideal alternating-motif rate.
- name: iter0_candidate1
  rationale: Random-looking sequences are judged by an evidence accumulation process
    where each item in the sequence provides a baseline weight of evidence for randomness.
    This accumulated evidence is then discounted by the sequence's deviation from
    a messy prototype, which is characterized by an ideal positive imbalance and an
    aversion to long streaks of identical outcomes.
- name: iter0_candidate2
  rationale: "Random-looking sequences are judged by an evidence accumulation process\
    \ where each item provides a baseline weight of evidence for randomness. This\
    \ accumulated evidence is then discounted by the sequence's deviation from a messy\
    \ prototype\u2014an ideal positive imbalance and an ideal alternation rate\u2014\
    using an asymmetric quadratic penalty that punishes under-alternation (streaks)\
    \ with a different, flexibly stronger weight than over-alternation."
- name: iter1_candidate0
  rationale: Random-looking sequences are judged by an evidence accumulation process
    where each item provides a baseline weight of evidence, which is discounted by
    the sequence's deviation from a messy prototype. Rather than evaluating the global
    alternation rate, this prototype specifies an ideal run length, and each run incurs
    a penalty proportional to its squared deviation from this ideal length (alongside
    a penalty for overall imbalance), simultaneously punishing extreme alternation
    rates and disproportionately long local streaks.
- name: iter1_candidate1
  rationale: Random-looking sequences are judged by an evidence accumulation process
    where each item provides a baseline weight of evidence, which is discounted by
    the sequence's quadratic deviation from a three-dimensional messy prototype. This
    prototype consists of an ideal positive imbalance, an ideal alternation rate,
    and an ideal normalized maximum run length, directly penalizing sequences that
    contain disproportionately long local streaks even when their global alternation
    rate is typical.
- name: iter1_candidate2
  rationale: Random-looking sequences are evaluated by their constituent streaks (runs),
    where each run incurs a cognitive penalty proportional to its squared deviation
    from an ideal 'messy' run length. Because this single penalty operates locally
    on every run, it naturally accounts for ideal alternation rates, strongly punishes
    disproportionately long clusters, and implicitly penalizes global imbalance without
    requiring separate tracking of these global features.
