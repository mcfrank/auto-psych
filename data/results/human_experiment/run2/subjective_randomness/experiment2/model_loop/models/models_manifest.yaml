models:
- name: prototype_similarity
  rationale: Random-looking sequences are close to a prototype with balanced H/T counts
    and an ideal alternation rate.
- name: encoding_compressibility
  rationale: Random-looking sequences are those with low simple-description penalties
    like long runs, periodic templates, and imbalance.
- name: bayesian_diagnosticity
  rationale: Randomness is the log-likelihood ratio of a fair coin versus a regular
    process (a mixture of a complexity-penalized motif process and a biased coin).
- name: window_typicality
  rationale: Random-looking sequences have a longest run typical of a fair coin seen
    through a limited memory window; over-long streaks look non-random.
- name: inner_loop_model
  rationale: Random-looking sequences are judged by their Euclidean distance to a
    messy prototype with a strictly positive ideal imbalance and an ideal alternation
    rate, with quadratic asymmetric penalties.
- name: falk_konold_difficulty
  rationale: Random-looking sequences are those that are cognitively harder to encode
    into chunks, as quantified by Falk and Konold's Difficulty Predictor (the number
    of repetition motifs plus twice the number of alternation motifs) normalized by
    sequence length.
- name: manhattan_messy_prototype
  rationale: Random-looking sequences are judged by their Manhattan (absolute) distance
    to a messy prototype with a strictly positive ideal imbalance and an ideal alternation
    rate, with absolute-value penalties that are asymmetric for alternation rate.
- name: iter0_candidate0
  rationale: Random-looking sequences are judged by their deviation from a messy prototype
    (an ideal positive imbalance and ideal alternation rate), but the cognitive penalty
    grows as a quartic (power of 4) function of the deviation rather than a quadratic
    one. This different functional form creates a much wider, flatter tolerance for
    near-ideal sequences but imposes significantly harsher penalties on extreme deviations
    like exact balance or severe imbalance.
- name: iter0_candidate1
  rationale: 'Hypothesis: Random-looking sequences are judged by an evidence accumulation
    process where each item in the sequence provides a baseline "weight of evidence"
    for randomness, which is then discounted by the sequence''s quadratic deviation
    from a messy prototype (an ideal positive imbalance and ideal alternation rate).
    This mechanism naturally creates a preference for longer sequences when they are
    near-ideal, but more heavily penalizes long sequences that clearly deviate from
    the prototype.'
- name: iter0_candidate2
  rationale: People evaluate randomness by assessing the structural diversity of a
    sequence's run-lengths. They compute a positive cognitive score based on the combinatorial
    diversity of the sequence (the log number of ways to arrange the observed counts
    of short, medium, and long runs) combined with a weighted preference for the sheer
    number of those runs. Because this mechanism accumulates positive structural evidence,
    longer balanced sequences naturally achieve higher scores than shorter ones, while
    highly regular sequences (zero diversity) and extremely imbalanced sequences (very
    few runs) are inherently penalized.
- name: iter1_candidate0
  rationale: Random-looking sequences are judged by an evidence accumulation process
    where each distinct run (streak of identical outcomes) provides a baseline weight
    of evidence for randomness, which is then discounted by the sequence's deviation
    from a messy prototype (ideal imbalance and alternation rate). By accumulating
    evidence per run rather than per item, this mechanism naturally penalizes periodic
    patterns with artificially few runs (like HHTTHHTT) without needing a separate
    periodicity cue, while still using the prototype distance to heavily penalize
    extreme over-alternation.
- name: iter1_candidate1
  rationale: Random-looking sequences are judged by an evidence accumulation process
    where baseline evidence is discounted by the sequence's deviation from a messy
    prototype, but rather than tracking local alternation rates, people explicitly
    penalize global repeating templates (periodicity). The prototype thus consists
    of an ideal imbalance and an ideal (low) periodicity, naturally explaining the
    harsh rejection of structured, repeating sequences like HHTTHHTT that a simple
    alternation-rate penalty misses.
- name: iter1_candidate2
  rationale: Random-looking sequences are judged by an evidence accumulation process
    where each item provides a baseline weight of evidence, which is discounted by
    the sequence's quadratic deviation from a messy prototype. Crucially, this prototype
    evaluates alternation not as an absolute rate, but relative to the maximum possible
    alternations given the sequence's specific tally of heads and tails (alongside
    a penalty for non-ideal imbalance). By penalizing sequences that deviate from
    an ideal *relative* alternation rate, this mechanism naturally captures why people
    reject highly structured or periodic sequences (like HHTTHHTT) that have typical
    absolute alternation rates but are severely under-alternating for their composition.
