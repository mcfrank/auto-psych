<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment (Preview)</title>
  <script src="https://unpkg.com/jspsych@8.2.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
  <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />
</head>
<body></body>
<script>
  // Sample data: same structure as pipeline-injected content (precomputed stimulus_display, no .split() in browser).
  // Button responses ONLY — the same modality the pipeline's implement validator enforces and the real template uses.
  const consentHtml = "<p><strong>Consent</strong></p><p>This experiment is part of a research study. By continuing, you confirm that you have read the information sheet and agree to participate.</p>";
  const instructionsHtml = "<p><strong>Instructions</strong></p><p>Which sequence looks more random?</p><p>On each trial you will see two sequences of coin flips (H and T).</p><p>Click <strong>Sequence A</strong> for the left sequence or <strong>Sequence B</strong> for the right.</p>";
  const trialVariables = [
    { stimulus_display: '<div style="display: flex; justify-content: space-around; align-items: center; gap: 3em; margin: 2em auto; max-width: 800px;"><div style="flex: 1; text-align: center;"><p style="font-family: monospace; font-size: 22px; margin: 0.5em 0;">H H T H T T H T</p><p style="font-size: 14px; color: #555;">Sequence A (left)</p></div><div style="flex: 1; text-align: center;"><p style="font-family: monospace; font-size: 22px; margin: 0.5em 0;">T H T H T H T H</p><p style="font-size: 14px; color: #555;">Sequence B (right)</p></div></div><p style="margin-top: 2em;">Which looks more random?</p>', sequence_a: "HHTHTTHT", sequence_b: "THTHTHTH" },
    { stimulus_display: '<div style="display: flex; justify-content: space-around; align-items: center; gap: 3em; margin: 2em auto; max-width: 800px;"><div style="flex: 1; text-align: center;"><p style="font-family: monospace; font-size: 22px; margin: 0.5em 0;">T T T T T T T T</p><p style="font-size: 14px; color: #555;">Sequence A (left)</p></div><div style="flex: 1; text-align: center;"><p style="font-family: monospace; font-size: 22px; margin: 0.5em 0;">H H H H H H H H</p><p style="font-size: 14px; color: #555;">Sequence B (right)</p></div></div><p style="margin-top: 2em;">Which looks more random?</p>', sequence_a: "TTTTTTTT", sequence_b: "HHHHHHHH" },
    { stimulus_display: '<div style="display: flex; justify-content: space-around; align-items: center; gap: 3em; margin: 2em auto; max-width: 800px;"><div style="flex: 1; text-align: center;"><p style="font-family: monospace; font-size: 22px; margin: 0.5em 0;">H T H T H T H T</p><p style="font-size: 14px; color: #555;">Sequence A (left)</p></div><div style="flex: 1; text-align: center;"><p style="font-family: monospace; font-size: 22px; margin: 0.5em 0;">T H T H T H T H</p><p style="font-size: 14px; color: #555;">Sequence B (right)</p></div></div><p style="margin-top: 2em;">Which looks more random?</p>', sequence_a: "HTHTHTHT", sequence_b: "THTHTHTH" }
  ];
  const trialChoices = ['Sequence A (left)', 'Sequence B (right)'];
  const debriefHtml = "<p>Thank you for participating.</p>";

  const onFinish = function() { console.log(jsPsych.data.get().json()); };
  const jsPsych = initJsPsych({ on_finish: onFinish });
  const timeline = [];

  timeline.push({ type: jsPsychHtmlButtonResponse, stimulus: consentHtml, choices: ['I agree'] });
  timeline.push({ type: jsPsychHtmlButtonResponse, stimulus: instructionsHtml, choices: ['Begin'], post_trial_gap: 1000 });

  const trial = {
    type: jsPsychHtmlButtonResponse,
    stimulus: jsPsych.timelineVariable('stimulus_display'),
    choices: trialChoices,
    data: {
      sequence_a: jsPsych.timelineVariable('sequence_a'),
      sequence_b: jsPsych.timelineVariable('sequence_b'),
      task: 'judgment'
    },
    on_finish: function(data) {
      // First button (index 0) is the LEFT / Sequence A option.
      data.chose_left = (data.response === 0);
    }
  };
  timeline.push({
    timeline: [trial],
    timeline_variables: trialVariables,
    randomize_order: true
  });

  timeline.push({ type: jsPsychHtmlButtonResponse, stimulus: debriefHtml, choices: ['Finish'] });
  jsPsych.run(timeline);
</script>
</html>
