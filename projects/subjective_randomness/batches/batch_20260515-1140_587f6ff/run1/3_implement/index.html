: flex; justify-content: space-around; align-items: center; gap: 3em; margin: 2em auto; max-width: 800px;\"><div style=\"flex: 1; text-align: center;\"><p style=\"font-family: monospace; font-size: 22px; margin: 0.5em 0;\">T H T H<\/p><p style=\"font-size: 14px; color: #555;\">Left<\/p><\/div><div style=\"flex: 1; text-align: center;\"><p style=\"font-family: monospace; font-size: 22px; margin: 0.5em 0;\">T T H H<\/p><p style=\"font-size: 14px; color: #555;\">Right<\/p><\/div><\/div>", "sequence_a": "THTH", "sequence_b": "TTHH"}];
  const trialChoices = ["f", "j", "ArrowLeft", "ArrowRight"];
  const debriefHtml = "<p>Thank you for participating.<\/p><p>Press any key to finish.<\/p>";

  // Capture participant_id from URL (?participant_id=xxx) for Prolific/simulated participants
  function getUrlParam(name) {
    var m = new RegExp('[?&]' + name + '=([^&]*)').exec(typeof window !== 'undefined' && window.location ? window.location.search : '');
    return m ? decodeURIComponent(m[1]) : null;
  }
  var urlParticipantId = getUrlParam('participant_id');
  if (urlParticipantId && typeof window !== 'undefined') window.__participantId = urlParticipantId;

  const onFinish = function() {
    var data = jsPsych.data.get().values();
    console.log(data);
    if (typeof window !== 'undefined') window.__experimentData = data;
    fetch('/auto_psych_config.json').then(function(r){
      if (!r.ok) { console.warn('[auto-psych] /auto_psych_config.json failed:', r.status); return null; }
      return r.json();
    }).then(function(cfg){
      if (cfg && cfg.project_id != null && cfg.run_id != null) {
        var payload = { run_id: cfg.run_id, project_id: cfg.project_id,
          participant_id: (typeof window !== 'undefined' && window.__participantId != null) ? window.__participantId : Date.now(),
          trials: data };
        fetch('/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
          .then(function(res){
            console.log('[auto-psych] POST /submit', res.status, res.ok ? 'OK' : 'FAIL');
            if (res.ok && cfg.prolific_redirect_url && typeof window !== 'undefined') window.location = cfg.prolific_redirect_url;
          })
          .catch(function(e){ console.warn('[auto-psych] POST /submit error', e); });
      } else {
        console.log('[auto-psych] No Firebase config (project_id/run_id); skipping POST /submit');
      }
    }).catch(function(e){ console.warn('[auto-psych] Config fetch error', e); });
  };

  const jsPsych = initJsPsych({ on_finish: onFinish });
  if (typeof window !== 'undefined' && window.__participantId) jsPsych.data.addProperties({ participant_id: window.__participantId });
  const timeline = [];

  var totalTrials = trialVariables.length;
  var completedTrials = 0;
  function updateProgress() {
    var el = document.getElementById('progress-fill');
    if (el && totalTrials > 0) el.style.width = (100 * completedTrials / totalTrials) + '%';
  }

  function styledButtonHtml(choice) {
    return '<button class="jspsych-btn jspsych-btn-auto">' + choice + '</button>';
  }

  // 1. Consent – button "I agree"
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: consentHtml,
    choices: ['I agree'],
    button_html: styledButtonHtml
  });

  // 2. Instructions – button "Next"
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: instructionsHtml,
    choices: ['Next'],
    button_html: styledButtonHtml,
    post_trial_gap: 400
  });

  // 3. Trials: for each stimulus, [fixation 150ms, then main trial] (keyboard) — short fixation to reduce collect-step latency
  const fixation = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div style="text-align:center; font-size:48px;">+</div>',
    choices: 'NO_KEYS',
    trial_duration: 150
  };
  const trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: jsPsych.timelineVariable('stimulus_display'),
    choices: trialChoices,
    data: {
      sequence_a: jsPsych.timelineVariable('sequence_a'),
      sequence_b: jsPsych.timelineVariable('sequence_b'),
      task: 'judgment'
    },
    on_finish: function(data) {
      data.chose_left = (data.response === 'f' || data.response === 'ArrowLeft');
      completedTrials++;
      updateProgress();
    }
  };
  timeline.push({
    timeline: [fixation, trial],
    timeline_variables: trialVariables,
    randomize_order: true
  });

  // 4. Debrief – button "End"
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: debriefHtml,
    choices: ['End'],
    button_html: styledButtonHtml
  });

  jsPsych.run(timeline);
</script>
