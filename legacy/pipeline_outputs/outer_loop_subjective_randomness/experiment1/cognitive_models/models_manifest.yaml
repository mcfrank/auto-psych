models:
  - name: alternation_bias
    rationale: |
      People expect random sequences to alternate more than probability theory predicts.
      This model scores sequences by their alternation rate (fraction of adjacent pairs
      that differ), giving higher probability to whichever sequence alternates more.
  - name: balance_heuristic
    rationale: |
      People expect random sequences to have roughly equal numbers of H and T.
      This model scores sequences by how close they are to 50% heads, giving higher
      probability to whichever sequence is more balanced.
  - name: griffiths_representativeness
    rationale: |
      Based on Griffiths & Tenenbaum's representativeness framework: a sequence seems
      random if its statistics (both alternation rate and H/T balance) are close to
      what a fair coin would produce (0.5 each). Deviations on either dimension reduce
      perceived randomness.
