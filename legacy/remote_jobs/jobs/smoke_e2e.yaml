# End-to-end smoke manifest. Used by remote_jobs/smoke_e2e.sh.
#
# Tiny ground-truth-model run on subjective_randomness: 1 sbatch, 1 run, 2 simulated
# participants. Theory/design/interpret still call Gemini (so this exercises the full
# pipeline path), but collect uses the deterministic ground-truth model -- no LLM
# steering, no browser. The whole batch should finish in roughly 5-10 minutes.

name: smoke_e2e
project: subjective_randomness
mode: simulated_participants_nobrowser
n_participants: 2
max_retries: 2

matrix:
  ground_truth_model:
    - alternation
  runs:
    - 1

slurm:
  time: "00:30:00"
  cpus_per_task: 2
  mem: "4G"
  partition: normal
