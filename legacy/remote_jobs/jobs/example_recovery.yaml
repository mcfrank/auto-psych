# Example manifest: parameter recovery for subjective_randomness, two ground-truth models in parallel.
# Submit with: ./remote_jobs/submit.py remote_jobs/jobs/example_recovery.yaml
#
# Each value of the matrix dimensions is crossed with all others; one sbatch is submitted per cell.
# This file would produce 2 (ground_truth_model) x 1 (runs) = 2 sbatch jobs, each running a full
# 5-run batch on a separate cluster node.

name: example_recovery
project: subjective_randomness
mode: simulated_participants_nobrowser
n_participants: 5
max_retries: 3

# Top-level non-matrix args are applied to every cell. Matrix dims explode into a cross-product.
matrix:
  ground_truth_model:
    - alternation
    - prefer_more_heads
  runs:
    - 5

# SLURM resources for each sbatch invocation. submit.py turns these into --time / --cpus-per-task /
# --mem / --partition flags; the .slurm template itself has no SBATCH directives.
slurm:
  time: "04:00:00"
  cpus_per_task: 4
  mem: "16G"
  partition: normal
