models:
  - name: representativeness
    rationale: |
      Prefer the sequence whose proportion of heads is closer to 50/50.
      Captures the balance heuristic: people judge sequences with near-equal
      H and T counts as more representative of a random process.
  - name: alternation
    rationale: |
      Prefer the sequence with more H-T and T-H transitions.
      Captures the well-documented alternation bias: people expect random
      sequences to switch frequently between outcomes.
  - name: griffiths_representativeness
    rationale: |
      Prefer the sequence with higher likelihood under a subjective alternating
      Markov chain (alternation probability = 0.7). Implements the rational
      basis of representativeness (Griffiths & Tenenbaum): participants use an
      internally calibrated generator that over-weights alternations, making
      such sequences 'look' more random to them.
