# Theory probabilities after Experiment 1
#
# Derivation:
#   Base weight: equal priors (1/3 each) — Pearson r is undefined for all models
#   due to constant predictions (design confound), so r-based weighting is not used.
#   Penalty: multiply by 0.7 per Bonferroni-significant failure (p < 0.05/5 = 0.01)
#   Normalization: theories sum to 1.0 - reserved_for_new = 0.75
#   reserved_for_new = 0.25 (high, because no model fits adequately)
#
# Significant failures:
#   griffiths_representativeness: 2  (mean_chose_left, fraction_moderate_choices)
#   alternation_bias: 3              (mean_abs_error, mean_chose_right, fraction_moderate_choices)
#   balance_heuristic: 3             (mean_abs_error, mean_chose_right, fraction_moderate_choices)
#
# Pre-normalization scores:
#   griffiths:  0.333 * 0.7^2 = 0.163
#   alternation: 0.333 * 0.7^3 = 0.114
#   balance:    0.333 * 0.7^3 = 0.114
#   sum = 0.391
#
# After normalization to 0.75:
#   griffiths: 0.75 * (0.163 / 0.391) = 0.31
#   alternation: 0.75 * (0.114 / 0.391) = 0.22
#   balance: 0.75 * (0.114 / 0.391) = 0.22

theories:
  griffiths_representativeness: 0.31
  alternation_bias: 0.22
  balance_heuristic: 0.22
reserved_for_new: 0.25
