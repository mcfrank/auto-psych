models:
  - name: griffiths_representativeness
    rationale: |
      Rational representativeness (Griffiths & Tenenbaum 2001): a sequence looks more
      random when both its alternation rate and H/T balance are close to 0.5, the
      statistics expected from a fair-coin generator. Combines both dimensions equally via
      squared deviation from 0.5.
  - name: alternation_bias
    rationale: |
      Gambler's fallacy / negative recency bias: people expect random sequences to
      alternate frequently, so they judge sequences with more H→T and T→H transitions
      as "more random," independent of overall balance.
  - name: balance_heuristic
    rationale: |
      Balance heuristic: people expect random sequences to contain roughly equal H and T,
      so they choose whichever sequence is closer to 50/50 balance, ignoring the
      pattern or ordering of flips.
  - name: griffiths_v2
    rationale: |
      Griffiths representativeness variant with balance-dominant weighting: balance
      deviation is penalized 4x more than alternation deviation. Motivated by experiment 1
      where balance explained most variance (r = 0.63) while alternation showed no
      predictive power (r = -0.056). Tests whether a reweighted Griffiths model improves fit.
  - name: weighted_balance_alternation
    rationale: |
      Additive combination of balance closeness (weight 0.7) and alternation closeness
      (weight 0.3) to 0.5. Both cues are included but balance is primary. Motivated by
      experiment 1 showing balance dominates, with some evidence that alternation matters
      among balanced sequences. More interpretable than the Griffiths squared-deviation form.
